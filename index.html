<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0f17;
  --surface: #111620;
  --card:    #131925;
  --border:  #1e2738;
  --border2: #263045;
  --accent:  #4a9eff;
  --green:   #3dd68c;
  --warn:    #f5a623;
  --red:     #ff5f57;
  --text:    #d4e0f0;
  --sub:     #6b80a0;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(30,60,120,0.22) 0%, transparent 60%);
  pointer-events: none;
}

#app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; gap: 24px;
  padding: 0 24px; height: 52px;
  background: rgba(11,15,23,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: #fff; letter-spacing: 0.04em; }
.logo span { color: var(--accent); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.counts { display: flex; gap: 14px; }
.cnt { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--sub); }
.cnt-dot { width: 6px; height: 6px; border-radius: 50%; }
.cnt-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
.cnt-dot.warn { background: var(--warn); }
.cnt-dot.off  { background: #2a3348; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.cnt strong { color: var(--text); font-weight: 600; }

/* ── LAYOUT ── */
.shell { display: flex; flex: 1; }

/* ── SIDEBAR ── */
aside {
  width: 200px; flex-shrink: 0;
  background: rgba(11,15,23,0.6);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  display: flex; flex-direction: column; gap: 1px;
}
.sl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--sub); padding: 0 16px 8px; text-transform: uppercase; }
.fbtn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 16px; background: none; border: none; cursor: pointer; color: var(--sub); font-family: var(--sans); font-size: 13px; font-weight: 400; text-align: left; transition: color 0.15s, background 0.15s; position: relative; }
.fbtn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.fbtn.active { color: var(--text); }
.fbtn.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 2px; background: var(--accent); border-radius: 0 2px 2px 0; }
.fbtn .fc { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--sub); }
.fbtn.active .fc { color: var(--accent); }
.sdiv { height: 1px; background: var(--border); margin: 12px 16px; }
.sidebar-foot { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
.sys-row { display: flex; justify-content: space-between; padding: 4px 0; }
.sys-key { font-family: var(--mono); font-size: 10px; color: var(--sub); }
.sys-val { font-family: var(--mono); font-size: 10px; color: var(--text); }
.sys-val.ok { color: var(--green); }

/* ── MAIN ── */
main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; position: relative; }

/* ── TOOLBAR ── */
.toolbar { display: flex; align-items: center; gap: 10px; }
.search-wrap { position: relative; }
.search-wrap input { width: 240px; padding: 8px 12px 8px 32px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; border-radius: 6px; outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--border2); }
.search-wrap input::placeholder { color: var(--sub); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 12px; pointer-events: none; }
.sort-sel { padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); color: var(--sub); font-family: var(--mono); font-size: 11px; border-radius: 6px; outline: none; cursor: pointer; }
.grid-toggles { display: flex; gap: 4px; margin-left: auto; }
.gt { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--sub); font-size: 13px; cursor: pointer; border-radius: 5px; transition: all 0.15s; }
.gt:hover, .gt.active { border-color: var(--border2); color: var(--text); }
.refresh-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--sub); cursor: pointer; border-radius: 5px; transition: all 0.15s; }
.refresh-btn:hover { color: var(--accent); border-color: var(--border2); }
.refresh-btn.spin svg { animation: spin 0.5s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── GRID ── */
.cam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; position: relative; }
.cam-grid.g2 { grid-template-columns: repeat(2,1fr); }
.cam-grid.g3 { grid-template-columns: repeat(3,1fr); }
.cam-grid.g4 { grid-template-columns: repeat(4,1fr); }
.cam-grid.gl { grid-template-columns: 1fr; }

/* ── LOADING / EMPTY STATE with weather station ── */
.loading-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px 60px;
  gap: 18px;
}
.loading-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--sub);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  animation: fadePulse 2s ease-in-out infinite;
}
@keyframes fadePulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

/* The centered SVG station */
.station-svg {
  width: 220px;
  height: 270px;
  opacity: 0.18;
}

/* Horizontal anemometer spin — rotates around vertical axis (top of pole) */
@keyframes spinH { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.anem-rotor {
  transform-origin: 100px 44px;
  animation: spinH 2.4s linear infinite;
}

/* ── CARD ── */
.cam-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.18s, transform 0.18s; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.cam-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.cam-card.sel { border-color: var(--accent); }

.cam-feed { position: relative; aspect-ratio: 16/9; overflow: hidden; }
.feed-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.fb-traffic { background: linear-gradient(160deg, #080f1e, #0c1a30); }
.fb-tower   { background: linear-gradient(160deg, #080810, #0c0c1c); }
.fb-hazard  { background: linear-gradient(160deg, #120808, #1c0c08); }
.feed-bg::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(74,158,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(74,158,255,0.04) 1px, transparent 1px); background-size: 30px 30px; }
.feed-icon { position: relative; z-index: 1; font-size: 28px; opacity: 0.15; }
.fov { position: absolute; font-family: var(--mono); font-size: 9px; letter-spacing: 0.07em; z-index: 3; color: rgba(180,210,255,0.4); }
.fov-tl { top: 8px; left: 10px; }
.fov-bl { bottom: 8px; left: 10px; }
.feed-status { position: absolute; top: 8px; right: 10px; display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 4px; z-index: 4; }
.fs-live    { color: var(--green); background: rgba(61,214,140,0.08);  border: 1px solid rgba(61,214,140,0.18); }
.fs-warn    { color: var(--warn);  background: rgba(245,166,35,0.08);  border: 1px solid rgba(245,166,35,0.18); }
.fs-offline { color: #3a4a60;      background: rgba(30,39,56,0.5);     border: 1px solid rgba(30,39,56,0.8); }
.fs-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.fs-live .fs-dot { animation: pulse 2s ease-in-out infinite; }
.cam-body { padding: 10px 12px 12px; }
.cam-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cam-meta { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; color: var(--sub); margin-bottom: 10px; }
.type-tag { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
.tt-traffic { color: var(--accent); background: rgba(74,158,255,0.1);  border: 1px solid rgba(74,158,255,0.18); }
.tt-tower   { color: #a78bfa;       background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.18); }
.tt-hazard  { color: var(--warn);   background: rgba(245,166,35,0.1);  border: 1px solid rgba(245,166,35,0.18); }
.cam-actions { display: flex; gap: 6px; }
.ca-btn { flex: 1; padding: 5px 4px; background: none; border: 1px solid var(--border); color: var(--sub); font-family: var(--sans); font-size: 11px; font-weight: 500; cursor: pointer; border-radius: 5px; transition: all 0.15s; }
.ca-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── DETAIL PANEL ── */
.dp { display: none; position: fixed; top: 52px; right: 0; bottom: 0; width: 300px; background: var(--surface); border-left: 1px solid var(--border); z-index: 200; flex-direction: column; animation: slideIn 0.2s ease; }
.dp.open { display: flex; }
@keyframes slideIn { from{transform:translateX(20px);opacity:0;} to{transform:translateX(0);opacity:1;} }
.dp-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.dp-title { font-size: 13px; font-weight: 500; color: var(--text); }
.dp-close { background: none; border: none; color: var(--sub); font-size: 16px; cursor: pointer; transition: color 0.15s; }
.dp-close:hover { color: var(--text); }
.dp-feed { aspect-ratio: 16/9; overflow: hidden; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.dp-body { padding: 12px 16px; overflow-y: auto; flex: 1; }
.dp-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.dp-row:last-child { border-bottom: none; }
.dp-k { font-family: var(--mono); font-size: 10px; color: var(--sub); }
.dp-v { font-family: var(--mono); font-size: 11px; color: var(--text); font-weight: 500; }

/* ── FOOTER ── */
.foot { padding: 6px 20px; border-top: 1px solid var(--border); background: rgba(11,15,23,0.7); font-family: var(--mono); font-size: 10px; color: var(--sub); display: flex; gap: 16px; }
.foot b { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">sky<span>cam</span></div>
    <div class="header-right">
      <div class="counts">
        <div class="cnt"><div class="cnt-dot live"></div><strong id="cL">—</strong>&thinsp;live</div>
        <div class="cnt"><div class="cnt-dot warn"></div><strong id="cW">—</strong>&thinsp;warn</div>
        <div class="cnt"><div class="cnt-dot off"></div><strong id="cO">—</strong>&thinsp;offline</div>
      </div>
    </div>
  </header>

  <div class="shell">
    <aside>
      <div class="sl">Cameras</div>
      <button class="fbtn active" data-f="all"     onclick="setF('all',this)">    All       <span class="fc" id="c-all">0</span></button>
      <button class="fbtn"        data-f="traffic" onclick="setF('traffic',this)">Traffic   <span class="fc" id="c-traffic">0</span></button>
      <button class="fbtn"        data-f="tower"   onclick="setF('tower',this)">  Tower     <span class="fc" id="c-tower">0</span></button>
      <button class="fbtn"        data-f="hazard"  onclick="setF('hazard',this)"> HazCam    <span class="fc" id="c-hazard">0</span></button>
      <div class="sdiv"></div>
      <div class="sl">Status</div>
      <button class="fbtn" data-s="online"  onclick="setS('online',this)"> Live only</button>
      <button class="fbtn" data-s="warn"    onclick="setS('warn',this)">   Warnings</button>
      <button class="fbtn" data-s="offline" onclick="setS('offline',this)">Offline</button>
      <div class="sidebar-foot">
        <div class="sys-row"><span class="sys-key">Synced</span><span class="sys-val" id="synced">—</span></div>
        <div class="sys-row"><span class="sys-key">Active</span><span class="sys-val" id="active">—</span></div>
        <div class="sys-row"><span class="sys-key">Network</span><span class="sys-val ok">OK</span></div>
      </div>
    </aside>

    <main>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="q" type="text" placeholder="Search cameras…" oninput="render()">
        </div>
        <select class="sort-sel" id="sort" onchange="render()">
          <option value="name">Name</option>
          <option value="status">Status</option>
          <option value="type">Type</option>
        </select>
        <div class="grid-toggles">
          <button class="gt active" onclick="setG('',this)"   title="Auto">⊞</button>
          <button class="gt"        onclick="setG('g2',this)" title="2-col">⊟</button>
          <button class="gt"        onclick="setG('g3',this)" title="3-col">⊠</button>
          <button class="gt"        onclick="setG('g4',this)" title="4-col">⊡</button>
          <button class="gt"        onclick="setG('gl',this)" title="List">☰</button>
        </div>
        <button class="refresh-btn" id="rb" onclick="doRefresh()" title="Refresh">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>

      <div class="cam-grid" id="grid"></div>
      <div class="foot" id="foot"></div>
    </main>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="dp" id="dp">
  <div class="dp-head">
    <div class="dp-title" id="dpT">—</div>
    <button class="dp-close" onclick="closeD()">✕</button>
  </div>
  <div class="dp-feed" id="dpF"></div>
  <div class="dp-body" id="dpB"></div>
</div>

<!-- ── WEATHER STATION SVG TEMPLATE (used in loading state) ── -->
<template id="stationTpl">
  <svg class="station-svg" viewBox="0 0 200 270" xmlns="http://www.w3.org/2000/svg" fill="none">
    <style>
      .ws  { stroke:#4a9eff; stroke-linecap:round; stroke-linejoin:round; fill:none; }
      .wsf { fill:#4a9eff; stroke:none; }
      @keyframes spinH { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
      .anem-rotor { transform-origin:100px 44px; animation:spinH 2.4s linear infinite; }
    </style>

    <!-- Main pole -->
    <line class="ws" x1="100" y1="52" x2="100" y2="200" stroke-width="3"/>

    <!-- ── ANEMOMETER: horizontal arms + cups ── -->
    <!-- Vertical center shaft above pole top -->
    <line class="ws" x1="100" y1="30" x2="100" y2="52" stroke-width="2"/>
    <!-- Hub circle -->
    <circle class="ws" cx="100" cy="44" r="5" stroke-width="2"/>

    <!-- Rotating group: 3 horizontal arms at 0°, 120°, 240° -->
    <g class="anem-rotor">
      <!-- Arm 1: right -->
      <line class="ws" x1="100" y1="44" x2="130" y2="44" stroke-width="1.8"/>
      <!-- Cup 1: open bowl facing left (D-shape) -->
      <path class="ws" d="M130,38 Q142,38 142,44 Q142,50 130,50 Z" stroke-width="1.8"/>

      <!-- Arm 2: lower-left -->
      <line class="ws" x1="100" y1="44" x2="74" y2="70" stroke-width="1.8"/>
      <!-- Cup 2 -->
      <path class="ws" d="M69,65 Q63,71 69,77 Q75,77 79,71 Z" stroke-width="1.8" transform="rotate(120,74,70)"/>

      <!-- Arm 3: upper-left -->
      <line class="ws" x1="100" y1="44" x2="74" y2="18" stroke-width="1.8"/>
      <!-- Cup 3 -->
      <path class="ws" d="M69,13 Q63,19 69,25 Q75,25 79,19 Z" stroke-width="1.8" transform="rotate(240,74,18)"/>
    </g>

    <!-- ── WIND VANE (below anemometer hub on pole) ── -->
    <circle class="ws" cx="100" cy="72" r="3.5" stroke-width="1.8"/>
    <!-- Arrow head pointing right -->
    <polygon class="wsf" points="100,69 116,72 100,75" opacity="0.85"/>
    <!-- Tail fin -->
    <path class="ws" d="M100,72 L82,72 L78,66 M82,72 L78,78" stroke-width="1.5"/>

    <!-- ── MOUNTING BRACKET ── -->
    <line class="ws" x1="88" y1="100" x2="112" y2="100" stroke-width="1.5"/>
    <rect class="ws" x="96" y="97" width="8" height="6" rx="1" stroke-width="1.5"/>

    <!-- ── SENSOR RADIATION SHIELD (temp/humidity) ── -->
    <!-- stacked horizontal louvres -->
    <ellipse class="ws" cx="100" cy="130" rx="14" ry="4" stroke-width="1.5"/>
    <ellipse class="ws" cx="100" cy="137" rx="14" ry="4" stroke-width="1.5"/>
    <ellipse class="ws" cx="100" cy="144" rx="14" ry="4" stroke-width="1.5"/>
    <ellipse class="ws" cx="100" cy="151" rx="14" ry="4" stroke-width="1.5"/>
    <!-- shield connecting lines -->
    <line class="ws" x1="86" y1="130" x2="86" y2="151" stroke-width="1" opacity="0.5"/>
    <line class="ws" x1="114" y1="130" x2="114" y2="151" stroke-width="1" opacity="0.5"/>

    <!-- ── DISPLAY CONSOLE ── -->
    <!-- body -->
    <rect class="ws" x="68" y="178" width="64" height="46" rx="5" stroke-width="2"/>
    <!-- screen -->
    <rect x="74" y="184" width="52" height="28" rx="3" fill="rgba(74,158,255,0.08)" stroke="#4a9eff" stroke-width="1" opacity="0.6"/>
    <!-- abstract readout lines -->
    <rect x="78" y="188" width="20" height="5" rx="1.5" fill="#4a9eff" opacity="0.45"/>
    <rect x="102" y="188" width="12" height="5" rx="1.5" fill="#4a9eff" opacity="0.3"/>
    <rect x="118" y="188" width="6"  height="5" rx="1.5" fill="#4a9eff" opacity="0.3"/>
    <rect x="78" y="197" width="13" height="4" rx="1.5" fill="#4a9eff" opacity="0.28"/>
    <rect x="95" y="197" width="13" height="4" rx="1.5" fill="#4a9eff" opacity="0.28"/>
    <rect x="112" y="197" width="12" height="4" rx="1.5" fill="#4a9eff" opacity="0.28"/>
    <rect x="78" y="205" width="44" height="4" rx="1.5" fill="#4a9eff" opacity="0.18"/>
    <!-- button row at bottom of console -->
    <circle cx="80"  cy="217" r="3" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <circle cx="90"  cy="217" r="3" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <rect x="98" y="214" width="28" height="6" rx="2" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
    <!-- cable dashes from console up to pole bracket -->
    <path class="ws" d="M100 178 Q100 165 100 158" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.4"/>

    <!-- ── BASE / FOOT ── -->
    <rect class="ws" x="95" y="200" width="10" height="10" rx="1.5" stroke-width="1.5"/>
    <line class="ws" x1="82" y1="224" x2="118" y2="224" stroke-width="1.8"/>
    <rect class="ws" x="80" y="224" width="40" height="5" rx="2" stroke-width="1.5"/>
  </svg>
</template>

<script>
const CAMS = [
  {id:'CAM-001',name:'I-95 Northbound MP 42',    type:'traffic',status:'online', loc:'New Haven, CT',   lat:'41.31',lng:'-72.92',fps:30,res:'1080p'},
  {id:'CAM-002',name:'Route 1 Interchange',       type:'traffic',status:'online', loc:'Stamford, CT',    lat:'41.05',lng:'-73.54',fps:24,res:'720p'},
  {id:'CAM-003',name:'I-84 Exit 57 Overpass',     type:'traffic',status:'warn',   loc:'Hartford, CT',    lat:'41.76',lng:'-72.68',fps:15,res:'720p'},
  {id:'CAM-004',name:'Merritt Pkwy Northbound',   type:'traffic',status:'online', loc:'Milford, CT',     lat:'41.22',lng:'-73.05',fps:30,res:'1080p'},
  {id:'CAM-005',name:'I-91 South Exit 15',        type:'traffic',status:'offline',loc:'Middletown, CT',  lat:'41.56',lng:'-72.65',fps:0, res:'—'},
  {id:'CAM-006',name:'I-95 SB Mile Marker 10',    type:'traffic',status:'online', loc:'Greenwich, CT',   lat:'41.02',lng:'-73.62',fps:30,res:'1080p'},
  {id:'CAM-007',name:'Mt. Shasta Summit',         type:'tower',  status:'online', loc:'Shasta, CA',      lat:'41.41',lng:'-122.19',fps:30,res:'4K'},
  {id:'CAM-008',name:'Denver 14er Lookout',       type:'tower',  status:'online', loc:'Denver, CO',      lat:'39.74',lng:'-104.98',fps:30,res:'1080p'},
  {id:'CAM-009',name:'Cascades Ridge Cam',        type:'tower',  status:'warn',   loc:'N. Cascades, WA', lat:'48.71',lng:'-121.20',fps:24,res:'1080p'},
  {id:'CAM-010',name:'Mojave Desert Tower',       type:'tower',  status:'online', loc:'Barstow, CA',     lat:'34.89',lng:'-117.02',fps:15,res:'4K'},
  {id:'CAM-011',name:'Blue Ridge Overlook',       type:'tower',  status:'offline',loc:'Roanoke, VA',     lat:'37.27',lng:'-79.94',fps:0, res:'—'},
  {id:'CAM-012',name:'Wildfire Perimeter Alpha',  type:'hazard', status:'online', loc:'Santa Cruz, CA',  lat:'37.00',lng:'-122.02',fps:10,res:'4K'},
  {id:'CAM-013',name:'Flood Watch Zone 3',        type:'hazard', status:'warn',   loc:'New Orleans, LA', lat:'29.95',lng:'-90.07',fps:10,res:'1080p'},
  {id:'CAM-014',name:'Landslide Monitor NW',      type:'hazard', status:'offline',loc:'Snoqualmie, WA',  lat:'47.52',lng:'-121.83',fps:0, res:'—'},
  {id:'CAM-015',name:'HAZ-CHEM Zone B2',          type:'hazard', status:'online', loc:'Baton Rouge, LA', lat:'30.44',lng:'-91.18',fps:5, res:'1080p'},
];

const TYPE_ICON = { traffic:'🚦', tower:'📡', hazard:'⚠️' };
const TYPE_BG   = { traffic:'fb-traffic', tower:'fb-tower', hazard:'fb-hazard' };
const TYPE_TAG  = { traffic:'tt-traffic', tower:'tt-tower', hazard:'tt-hazard' };

let fType='all', fStatus=null, selId=null;
let isLoading = true;

(function init(){
  updateCounts();
  // Simulate brief loading state, then render
  showLoading();
  setTimeout(() => { isLoading = false; render(); }, 1400);
  document.getElementById('synced').textContent = nt();
  document.getElementById('active').textContent = CAMS.filter(c=>c.status==='online').length+' / '+CAMS.length;
})();

function nt(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

function updateCounts(){
  document.getElementById('c-all').textContent     = CAMS.length;
  ['traffic','tower','hazard'].forEach(t => document.getElementById('c-'+t).textContent = CAMS.filter(c=>c.type===t).length);
  document.getElementById('cL').textContent = CAMS.filter(c=>c.status==='online').length;
  document.getElementById('cW').textContent = CAMS.filter(c=>c.status==='warn').length;
  document.getElementById('cO').textContent = CAMS.filter(c=>c.status==='offline').length;
}

function showLoading(){
  const grid = document.getElementById('grid');
  const tpl  = document.getElementById('stationTpl');
  const clone = tpl.content.cloneNode(true);
  grid.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'loading-state';
  wrap.appendChild(clone);
  const lbl = document.createElement('div');
  lbl.className = 'loading-label';
  lbl.textContent = 'Loading feeds…';
  wrap.appendChild(lbl);
  grid.appendChild(wrap);
  document.getElementById('foot').innerHTML = '';
}

function setF(t,btn){
  fType=t; fStatus=null;
  document.querySelectorAll('.fbtn[data-f]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.fbtn[data-s]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setS(s,btn){
  fStatus = fStatus===s ? null : s;
  document.querySelectorAll('.fbtn[data-s]').forEach(b=>b.classList.remove('active'));
  if(fStatus) btn.classList.add('active');
  render();
}
function setG(g,btn){
  document.querySelectorAll('.gt').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.getElementById('grid').className = 'cam-grid'+(g?' '+g:'');
}

function render(){
  if(isLoading) return;
  const q = document.getElementById('q').value.toLowerCase();
  const s = document.getElementById('sort').value;
  let list = CAMS.filter(c => {
    if(fType!=='all' && c.type!==fType) return false;
    if(fStatus && c.status!==fStatus) return false;
    if(q && !c.name.toLowerCase().includes(q) && !c.loc.toLowerCase().includes(q) && !c.id.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => {
    if(s==='name')   return a.name.localeCompare(b.name);
    if(s==='status') return a.status.localeCompare(b.status);
    if(s==='type')   return a.type.localeCompare(b.type);
    return 0;
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if(!list.length){
    // No results — show station as empty state too
    const tpl   = document.getElementById('stationTpl');
    const clone = tpl.content.cloneNode(true);
    const wrap  = document.createElement('div');
    wrap.className = 'loading-state';
    wrap.appendChild(clone);
    const lbl = document.createElement('div');
    lbl.className = 'loading-label';
    lbl.textContent = 'No cameras match your filters';
    wrap.appendChild(lbl);
    grid.appendChild(wrap);
    document.getElementById('foot').innerHTML = '';
    return;
  }

  list.forEach((c,i) => grid.appendChild(card(c,i)));
  document.getElementById('foot').innerHTML =
    `<b>${list.length}</b> of ${CAMS.length} cameras &nbsp;·&nbsp; ${fType==='all'?'all types':fType}${fStatus?' · '+fStatus:''} &nbsp;·&nbsp; <b>${nt()}</b>`;
}

function card(c,i){
  const d = document.createElement('div');
  d.className = 'cam-card'+(selId===c.id?' sel':'');
  d.style.animationDelay = Math.min(i*22,200)+'ms';
  const stCls = c.status==='online'?'fs-live':c.status==='warn'?'fs-warn':'fs-offline';
  const stLbl = c.status==='online'?'LIVE':c.status==='warn'?'WARN':'OFFLINE';
  d.innerHTML = `
    <div class="cam-feed">
      <div class="feed-bg ${TYPE_BG[c.type]}">
        <span class="feed-icon">${TYPE_ICON[c.type]}</span>
      </div>
      <div class="fov fov-tl">${c.id}</div>
      <div class="fov fov-bl">${c.fps>0?c.fps+'fps · '+c.res:'NO SIGNAL'}</div>
      <div class="feed-status ${stCls}"><div class="fs-dot"></div>${stLbl}</div>
    </div>
    <div class="cam-body">
      <div class="cam-name">${c.name}</div>
      <div class="cam-meta">
        <span class="type-tag ${TYPE_TAG[c.type]}">${c.type}</span>
        <span>${c.loc}</span>
      </div>
      <div class="cam-actions">
        <button class="ca-btn" onclick="openD('${c.id}',event)">Detail</button>
        <button class="ca-btn" onclick="alert('Fullscreen — coming soon')">Full</button>
        <button class="ca-btn" onclick="alert('Snapshot saved')">Snap</button>
      </div>
    </div>`;
  return d;
}

function openD(id,e){
  if(e) e.stopPropagation();
  const c = CAMS.find(x=>x.id===id); if(!c) return;
  selId = id;
  document.getElementById('dpT').textContent = c.name;
  const stCls = c.status==='online'?'fs-live':c.status==='warn'?'fs-warn':'fs-offline';
  const stLbl = c.status==='online'?'LIVE':c.status==='warn'?'WARN':'OFFLINE';
  document.getElementById('dpF').innerHTML = `
    <div class="feed-bg ${TYPE_BG[c.type]}" style="width:100%;height:100%;position:relative;">
      <span class="feed-icon" style="font-size:42px;">${TYPE_ICON[c.type]}</span>
      <div class="feed-status ${stCls}" style="top:8px;right:10px;"><div class="fs-dot"></div>${stLbl}</div>
    </div>`;
  const rows = [['ID',c.id],['Type',c.type],['Status',c.status.toUpperCase()],['Location',c.loc],['Coordinates',`${c.lat}, ${c.lng}`],['Resolution',c.res],['Frame Rate',c.fps>0?c.fps+' fps':'N/A'],['Updated',nt()]];
  document.getElementById('dpB').innerHTML = rows.map(([k,v])=>`<div class="dp-row"><span class="dp-k">${k}</span><span class="dp-v">${v}</span></div>`).join('');
  document.getElementById('dp').classList.add('open');
  render();
}
function closeD(){ selId=null; document.getElementById('dp').classList.remove('open'); render(); }
function doRefresh(){
  const b = document.getElementById('rb'); b.classList.add('spin');
  isLoading = true;
  showLoading();
  setTimeout(()=>{ b.classList.remove('spin'); isLoading=false; render(); }, 900);
  document.getElementById('synced').textContent = nt();
}
</script>
</body>
</html>
